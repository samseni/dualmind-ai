<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ChatGPT hexagonal swirl logo -->
  <g transform="translate(12, 12)" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Top arc -->
    <path d="M-3,-6 Q0,-8 3,-6"/>
    <!-- Top-right arc -->
    <path d="M3,-6 Q6,-3 6,0"/>
    <!-- Bottom-right arc -->
